<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#181a27" />
      <stop offset="100%" stop-color="#090a0f" />
    </radialGradient>
    
    <!-- Card 1 Gradient -->
    <linearGradient id="card1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Card 2 Gradient (Front Card) -->
    <linearGradient id="card2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#2563eb" stroke-width="4" opacity="0.15" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.1" />

  <g transform="translate(256, 256) scale(0.95) translate(-256, -256)">
    <!-- Back Card (Decentralized / Purple-Pink) -->
    <rect x="136" y="156" width="200" height="240" rx="24" fill="url(#card1Grad)" opacity="0.6" transform="rotate(-15, 236, 276)" />
    
    <!-- Front Card (Cyan-Blue) -->
    <rect x="176" y="116" width="200" height="240" rx="24" fill="url(#card2Grad)" filter="url(#glow)" />
    
    <!-- Styled Letter K in Card -->
    <path d="M 236 176 L 236 296 M 236 236 L 296 176 M 236 236 L 296 296" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Small Decorative Sparkles -->
    <circle cx="160" cy="120" r="6" fill="#06b6d4" filter="url(#glow)" />
    <circle cx="380" cy="360" r="8" fill="#ec4899" filter="url(#glow)" />
  </g>
</svg>
